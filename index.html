<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.E.M. Cloud | Command Center</title>
    <style>
        :root {
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-heavy: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #007AFF;
            --green: #34C759;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Navigation */
        nav {
            width: 260px;
            background: var(--glass);
            backdrop-filter: blur(40px);
            border-right: 1px solid var(--border);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 50px;
        }

        .logo span { font-weight: 200; opacity: 0.4; }

        .nav-item {
            padding: 12px 15px;
            border-radius: 12px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 5px;
            transition: 0.2s;
            cursor: pointer;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--glass-heavy);
            color: white;
        }

        /* Main Content */
        main {
            flex: 1;
            padding: 60px;
            background: radial-gradient(circle at top right, #121212, #000);
            overflow-y: auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
        }

        h1 { font-size: 34px; font-weight: 700; letter-spacing: -1px; }

        .status-pill {
            background: rgba(52, 199, 89, 0.1);
            color: var(--green);
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid rgba(52, 199, 89, 0.3);
            font-size: 12px;
            font-weight: 600;
        }

        /* Dashboard Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            background: var(--glass-heavy);
        }

        .card h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.4); margin-bottom: 15px; }
        .card .val { font-size: 24px; font-weight: 600; margin-bottom: 8px; font-family: 'SF Mono', monospace; }
        .card .desc { font-size: 14px; opacity: 0.5; }

        .btn {
            margin-top: 25px;
            background: white;
            color: black;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover { opacity: 0.9; transform: scale(0.98); }

        /* Loader Overlay */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div style="font-size: 10px; letter-spacing: 2px; opacity: 0.5;">H.E.M. CORE SECURITY</div>
    </div>

    <nav>
        <div class="logo">H.E.M. <span>CLOUD</span></div>
        <div class="nav-item active">Infrastructure</div>
        <div class="nav-item">Cinexa Plus</div>
        <div class="nav-item">HMN Networks</div>
        <div class="nav-item" style="margin-top: auto;" onclick="logout()">Sign Out</div>
    </nav>

    <main>
        <header>
            <h1>Command Center</h1>
            <div class="status-pill">● NODE 18.168.21.127 LIVE</div>
        </header>

        <div class="grid">
            <div class="card">
                <h3>Mainframe Hardware</h3>
                <div class="val">AWS EC2 t3.micro</div>
                <div class="desc">Ubuntu 24.04 • London Region</div>
                <button class="btn" onclick="window.open('https://eu-west-2.console.aws.amazon.com')">AWS Console</button>
            </div>

            <div class="card">
                <h3>Network Gateway</h3>
                <div class="val">Cloudflare Edge</div>
                <div class="desc">core.hemafrica.com</div>
                <button class="btn" onclick="window.open('https://dash.cloudflare.com')">Manage DNS</button>
            </div>

            <div class="card">
                <h3>Authentication</h3>
                <div class="val">Amazon Cognito</div>
                <div class="desc">User Pool: osqpzy</div>
                <button class="btn" onclick="window.open('https://eu-west-2.console.aws.amazon.com/cognito/v2/idp/user-pools/eu-west-2_9F2URffk8/users')">Manage Users</button>
            </div>
        </div>
    </main>

    <script>
        const COGNITO_DOMAIN = "https://eu-west-29f2urffk8.auth.eu-west-2.amazoncognito.com";
        const CLIENT_ID = "3uusgekid70adef850src7mr8t";
        const REDIRECT_URI = "https://core.hemafrica.com";

        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');

            if (code) {
                sessionStorage.setItem('hem_authorized', 'true');
                window.history.replaceState({}, document.title, "/"); 
                document.getElementById('loader').style.display = 'none';
            } else if (sessionStorage.getItem('hem_authorized')) {
                document.getElementById('loader').style.display = 'none';
            } else {
                window.location.href = `${COGNITO_DOMAIN}/login?client_id=${CLIENT_ID}&response_type=code&scope=openid+email&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`;
            }
        };

        function logout() {
            sessionStorage.clear();
            window.location.href = `${COGNITO_DOMAIN}/logout?client_id=${CLIENT_ID}&logout_uri=${encodeURIComponent(REDIRECT_URI)}`;
        }
    </script>
</body>
</html>
