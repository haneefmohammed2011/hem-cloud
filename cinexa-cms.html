<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>H.E.M. CORE | Cinexa+ CMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;900&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ff3b30; --bg: #000; --panel: #0a0a0a; --border: rgba(255,255,255,0.08); }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 50px; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .poster-slot { aspect-ratio: 2/3; background: #111; border: 2px dashed #222; border-radius: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-add { background: #ff3b30; color: white; padding: 12px 25px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>
    <a href="dashboard.html" style="color:#64748b; text-decoration:none; font-size:12px;"><i class="fa-solid fa-arrow-left"></i> RETURN TO CORE</a>
    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-top: 20px;">
        <div>
            <h1 style="font-size: 36px; font-weight: 900;">Cinexa+ <span style="color:#ff3b30;">CMS</span></h1>
            <p style="color: #64748b;">Content Management & Institutional Metadata</p>
        </div>
        <button class="btn-add">+ ADD NEW TITLE</button>
    </div>

    <div class="movie-grid">
        <div class="poster-slot"><i class="fa-solid fa-plus fa-2x"></i></div>
        </div>
</body>
</html>
