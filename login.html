<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.E.M. | Institutional Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;800&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #003399; --bg: #050b14; --success: #00ff88; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden;
            background-image: radial-gradient(circle at center, #0a192f 0%, #050b14 100%);
        }

        .auth-container { 
            text-align: center; 
            max-width: 400px; 
            width: 90%; 
            padding: 60px 40px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 2px;
        }

        .logo-mark { font-weight: 900; letter-spacing: -1px; font-size: 24px; margin-bottom: 10px; }
        .logo-mark span { color: var(--accent); }

        .status-badge {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            display: block;
        }

        h1 { font-weight: 300; font-size: 22px; margin-bottom: 40px; letter-spacing: -0.5px; }

        .btn-initialize { 
            width: 100%; 
            padding: 18px; 
            background: white; 
            color: black; 
            border: none; 
            font-weight: 800; 
            text-transform: uppercase; 
            font-size: 11px; 
            letter-spacing: 2px;
            cursor: pointer; 
            transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-initialize:hover { 
            background: var(--accent); 
            color: white; 
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 51, 153, 0.3);
        }

        .footer-link { margin-top: 30px; font-size: 10px; color: #475569; text-decoration: none; display: block; letter-spacing: 1px; }
        .hidden { display: none; }
        .authenticated-msg { color: var(--success); font-family: 'Space Mono', monospace; font-size: 12px; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="logo-mark">H.E.M. <span>CORE</span></div>
        <span class="status-badge" id="system-status">System ID: EU-WEST-2</span>
        
        <h1 id="portal-title">Institutional Command Portal</h1>
        
        <div id="login-view">
            <button class="btn-initialize" onclick="redirectToCognito()">
                Initialize Secure Session
            </button>
        </div>

        <div id="auth-view" class="hidden">
            <div class="authenticated-msg">SESSION SECURED // ACCESS GRANTED</div>
            <p style="margin-top: 20px; font-size: 11px; opacity: 0.5; font-family: 'Space Mono';">HANDSHAKE COMPLETE. REDIRECTING...</p>
        </div>

        <a href="mailto:it@hemafrica.com" class="footer-link">ENCRYPTED SUPPORT CHANNEL</a>
    </div>

   <script>
        // UPDATED CONFIG FOR LIVE INSTITUTIONAL DEPLOY
        const config = {
            cognitoDomain: "https://eu-west-29f2urffk8.auth.eu-west-2.amazoncognito.com",
            clientId: "3uusgekid70adef850src7mr8t",
            // MUST match your AWS Console Callback URL exactly
            redirectUri: "https://core.hemafrica.com/dashboard.html" 
        };

        function redirectToCognito() {
            // response_type=token allows the dashboard to grab the session immediately
            const loginUrl = `${config.cognitoDomain}/login?client_id=${config.clientId}&response_type=token&scope=email+openid+phone+profile&redirect_uri=${encodeURIComponent(config.redirectUri)}`;
            
            window.location.href = loginUrl;
        }

        function checkSession() {
            // Since we switched to 'token', we check the URL hash (#), not search params (?)
            const hash = window.location.hash;
            if (hash.includes('id_token=')) {
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('auth-view').classList.remove('hidden');
                document.getElementById('system-status').style.color = "var(--success)";
                document.getElementById('system-status').innerText = "STATUS: ONLINE";
                
                // Optional: Store the token before moving to dashboard
                const token = new URLSearchParams(hash.replace('#', '?')).get('id_token');
                localStorage.setItem('hem_token', token);
                
                // Small delay to show the "Access Granted" message
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            }
        }

        window.onload = checkSession;
    </script>
</body>
</html>
