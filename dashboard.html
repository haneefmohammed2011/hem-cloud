<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.E.M. CORE | Intelligence OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --hem-navy: #050a10; --hem-blue: #3B82F6; --hem-glass: rgba(16, 42, 67, 0.6); }
        body { font-family: 'Inter', sans-serif; background-color: var(--hem-navy); color: #e2e8f0; overflow: hidden; }
        .glass { background: var(--hem-glass); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .sidebar-active { background: linear-gradient(90deg, var(--hem-blue) 0%, transparent 100%); border-left: 4px solid var(--hem-blue); color: white !important; }
        .mono { font-family: 'Space Mono', monospace; }
        #app-loader { transition: opacity 0.5s ease; }
        .hidden-node { display: none !important; }
    </style>
</head>
<body>

    <div id="app-loader" class="fixed inset-0 z-[200] bg-[#050a10] flex flex-col items-center justify-center">
        <div class="mb-4">
            <h1 class="text-4xl font-black italic tracking-tighter">H.E.M <span class="text-blue-500">CORE</span></h1>
        </div>
        <div class="w-48 h-1 bg-white/5 rounded-full overflow-hidden">
            <div id="load-progress" class="bg-blue-600 h-full w-0 transition-all duration-700"></div>
        </div>
        <p id="auth-status" class="mt-4 text-[10px] mono text-slate-500 uppercase tracking-widest">Initialising Handshake...</p>
        <button id="manual-login" class="hidden mt-6 bg-blue-600 px-6 py-2 rounded-lg font-bold text-xs">RE-AUTHENTICATE WITH AWS</button>
    </div>

    <div id="core-interface" class="flex h-screen w-full opacity-0 transition-opacity duration-1000">
        
        <aside class="w-72 bg-[#08121d] border-r border-white/5 flex flex-col">
            <div class="p-8">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 bg-blue-500 rounded-full animate-pulse"></div>
                    <span class="text-xs font-black mono tracking-tighter uppercase">Intelligence OS v6.0</span>
                </div>
            </div>

            <nav class="flex-1 px-6 space-y-2">
                <p class="text-[10px] font-bold text-slate-600 uppercase mb-4 px-2">Operational Nodes</p>
                <button onclick="nav('dashboard')" class="nav-btn w-full flex items-center gap-4 px-4 py-3 rounded-xl sidebar-active">
                    <i class="fa-solid fa-grid-2"></i> <span class="text-sm font-semibold">Command Center</span>
                </button>
                <button onclick="nav('directory')" class="nav-btn w-full flex items-center gap-4 px-4 py-3 rounded-xl text-slate-400 hover:text-white transition-all">
                    <i class="fa-solid fa-users-viewfinder"></i> <span class="text-sm font-semibold">Staff Matrix</span>
                </button>
                <button data-rank="9" onclick="nav('revenue')" class="nav-btn w-full flex items-center gap-4 px-4 py-3 rounded-xl text-slate-400 hover:text-white transition-all hidden-node">
                    <i class="fa-solid fa-vault"></i> <span class="text-sm font-semibold text-emerald-400">Fiscal Pulse</span>
                </button>
                <button data-rank="10" onclick="nav('root')" class="nav-btn w-full flex items-center gap-4 px-4 py-3 rounded-xl text-slate-400 hover:text-white transition-all hidden-node">
                    <i class="fa-solid fa-microchip"></i> <span class="text-sm font-semibold text-red-500">System Root</span>
                </button>
            </nav>

            <div class="p-6 bg-[#0a1824] border-t border-white/5">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-blue-600 to-blue-900 flex items-center justify-center font-black shadow-2xl" id="ceo-avatar">H</div>
                    <div class="flex-1 overflow-hidden">
                        <p class="text-sm font-bold truncate" id="op-name">H. Mohammed</p>
                        <p class="text-[9px] mono text-blue-400 font-bold" id="op-rank">RANK 10 // CEO</p>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative">
            <header class="h-20 border-b border-white/5 flex items-center justify-between px-10">
                <h2 id="page-title" class="text-lg font-bold">Command Center</h2>
                <div class="flex items-center gap-6">
                    <div class="text-right">
                        <p class="text-[9px] text-slate-500 mono uppercase">Network Node</p>
                        <p id="node-ip" class="text-xs font-bold text-blue-500">Detecting...</p>
                    </div>
                </div>
            </header>

            <div id="view-port" class="flex-1 overflow-y-auto p-10 space-y-8">
                <div id="view-dashboard" class="space-y-8 animate-in fade-in duration-500">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="glass p-8 rounded-3xl relative overflow-hidden group">
                            <div class="absolute top-0 right-0 p-6 opacity-5 text-6xl group-hover:scale-110 transition-transform"><i class="fa-solid fa-coins"></i></div>
                            <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Live Revenue</p>
                            <h3 id="rev-display" class="text-4xl font-black mt-2 mono text-white">$0.00</h3>
                            <div id="rev-chart-mini" class="mt-4 h-12 w-full"></div>
                        </div>
                        <div class="glass p-8 rounded-3xl">
                            <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Platform Traffic</p>
                            <h3 class="text-4xl font-black mt-2 mono text-blue-500">8.4k <span class="text-xs text-slate-600">REQ/S</span></h3>
                        </div>
                        <div class="glass p-8 rounded-3xl">
                            <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Cloud Nodes</p>
                            <h3 class="text-4xl font-black mt-2 mono">32 <span class="text-xs text-green-500">ONLINE</span></h3>
                        </div>
                    </div>

                    <div class="glass p-8 rounded-3xl min-h-[400px]">
                        <canvas id="mainGrowthChart"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- ⚙️ CONFIGURATION & HANDSHAKE ---
        const firebaseConfig = {
            apiKey: "AIzaSyACO46sTJQffwsQJfFN9cqYa_oDKG14AfQ",
            authDomain: "hem-platform.firebaseapp.com",
            projectId: "hem-platform",
            storageBucket: "hem-platform.firebasestorage.app",
            messagingSenderId: "846707696620",
            appId: "1:846707696620:web:59676e4223dcbe6c9816c9"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const COGNITO_LOGIN_URL = "https://eu-west-29f2urffk8.auth.eu-west-2.amazoncognito.com/login?client_id=3uusgekid70adef850src7mr8t&redirect_uri=https://core.hemafrica.com/dashboard.html&response_type=token&scope=email+openid+phone+profile";

        let currentOperator = null;

        // --- 🧠 JWT & AUTH ENGINE ---
        async function authenticate() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const idToken = params.get('id_token');

            if (!idToken) {
                // No token found - Check if already logged in via Session or Redirect
                document.getElementById('auth-status').innerText = "Redirecting to AWS Identity Provider...";
                document.getElementById('manual-login').classList.remove('hidden');
                document.getElementById('manual-login').onclick = () => window.location.href = COGNITO_LOGIN_URL;
                return;
            }

            try {
                // Decode Cognito JWT
                const payload = JSON.parse(atob(idToken.split('.')[1]));
                const cognitoSub = payload.sub; 
                
                document.getElementById('auth-status').innerText = `Handshake Verified: ${payload.email}`;
                document.getElementById('load-progress').style.width = "60%";

                // Handshake with Firestore Rules 'hem_staff' collection
                const staffDoc = await db.collection("hem_staff").doc(cognitoSub).get();
                
                if (staffDoc.exists) {
                    currentOperator = staffDoc.data();
                    launchTerminal();
                } else {
                    // CEO Emergency Bypass: If first login
                    if(payload.email.includes("haneef")) {
                        await db.collection("hem_staff").doc(cognitoSub).set({
                            displayName: "Haneef Mohammed",
                            email: payload.email,
                            accessLevel: 10,
                            lastLogin: new Date().toISOString()
                        });
                        location.reload();
                    } else {
                        throw new Error("UNAUTHORIZED_NODE");
                    }
                }
            } catch (err) {
                document.getElementById('auth-status').innerText = "SYSTEM ERROR: Access Denied to Matrix.";
                console.error(err);
            }
        }

        // --- 🚀 TERMINAL LAUNCHER ---
        function launchTerminal() {
            document.getElementById('load-progress').style.width = "100%";
            setTimeout(() => {
                document.getElementById('app-loader').style.opacity = "0";
                document.getElementById('core-interface').classList.remove('opacity-0');
                setTimeout(() => document.getElementById('app-loader').remove(), 500);
                
                // Set UI Details
                document.getElementById('op-name').innerText = currentOperator.displayName;
                document.getElementById('op-rank').innerText = `RANK ${currentOperator.accessLevel} // ${getRankName(currentOperator.accessLevel)}`;
                
                applyPermissions(currentOperator.accessLevel);
                fetchNodeStats();
                initCharts();
            }, 800);
        }

        function getRankName(r) {
            return {10:"CEO", 9:"BOARD", 8:"SUPER ADMIN", 7:"ADMIN"}[r] || "OPERATOR";
        }

        function applyPermissions(level) {
            document.querySelectorAll('[data-rank]').forEach(el => {
                if (level >= parseInt(el.dataset.rank)) el.classList.remove('hidden-node');
            });
        }

        async function fetchNodeStats() {
            // Fetch IP for Node Tracking
            const ipData = await fetch('https://api.ipify.org?format=json').then(r => r.json());
            document.getElementById('node-ip').innerText = ipData.ip;

            // Live Revenue Stream
            db.collection("revenue").onSnapshot(snap => {
                let total = 0;
                snap.forEach(doc => total += doc.data().amount);
                document.getElementById('rev-display').innerText = `$${total.toLocaleString()}`;
            });
        }

        function initCharts() {
            const ctx = document.getElementById('mainGrowthChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                    datasets: [{
                        label: 'H.E.M. Network Throughput',
                        data: [400, 600, 550, 900, 1200, 1100, 1500],
                        borderColor: '#3B82F6',
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(59, 130, 246, 0.05)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: 'rgba(255,255,255,0.02)' }, ticks: { color: '#444' } },
                        x: { grid: { display: false }, ticks: { color: '#444' } }
                    }
                }
            });
        }

        function nav(page) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('sidebar-active'));
            event.currentTarget.classList.add('sidebar-active');
            document.getElementById('page-title').innerText = page.charAt(0).toUpperCase() + page.slice(1);
        }

        // --- ⚡ START ENGINE ---
        window.onload = authenticate;
    </script>
</body>
</html>
