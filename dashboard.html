<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.E.M. CORE | Global Admin Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/amazon-cognito-identity-js/6.3.7/amazon-cognito-identity-js.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --hem-navy: #050a10; --hem-blue: #3B82F6; --hem-glass: rgba(16, 42, 67, 0.4); }
        body { font-family: 'Inter', sans-serif; background-color: var(--hem-navy); color: #e2e8f0; }
        .glass { background: var(--hem-glass); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .sidebar-active { background: linear-gradient(90deg, var(--hem-blue) 0%, transparent 100%); border-left: 4px solid var(--hem-blue); color: white !important; }
        .mono { font-family: 'Space Mono', monospace; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .role-badge { font-size: 9px; padding: 2px 8px; border-radius: 4px; font-weight: 800; text-transform: uppercase; border: 1px solid currentColor; }
        .rank-10 { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
    </style>
</head>
<body class="overflow-hidden">

    <div id="auth-gate" class="fixed inset-0 z-[100] bg-[#050a10] flex items-center justify-center p-4">
        <div class="max-w-md w-full glass p-12 rounded-[3rem] shadow-2xl text-center">
            <h2 class="text-4xl font-black tracking-tighter text-white mb-2">HEM <span class="text-blue-500">CORE</span></h2>
            <p class="text-slate-500 text-[10px] mb-10 mono uppercase tracking-widest italic">AWS Global Infrastructure</p>
            
            <div class="space-y-4">
                <button onclick="launchCognitoHandshake()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-5 rounded-2xl shadow-lg transition-all flex items-center justify-center gap-3 active:scale-95">
                    <i class="fa-brands fa-aws text-xl"></i> 
                    SECURE COGNITO LOGIN
                </button>
                <p class="text-[10px] text-slate-600 font-bold uppercase tracking-tighter">Bypassing local auth gate... redirecting to AWS nodes</p>
            </div>
        </div>
    </div>

    <div id="main-interface" class="flex h-screen w-full hidden">
        <aside class="w-72 bg-[#08121d] border-r border-white/5 flex flex-col z-20">
            <div class="p-8 flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-black text-white">H</div>
                <h1 class="text-xl font-black tracking-tighter italic">HEM <span class="text-blue-500">CORE</span></h1>
            </div>
            <nav class="flex-1 px-4 space-y-1">
                <button onclick="showPage('dashboard')" class="nav-link sidebar-active w-full flex items-center gap-4 px-4 py-3 rounded-2xl"><i class="fa-solid fa-house-chimney"></i> <span class="text-sm font-semibold">Command Center</span></button>
            </nav>
            <div class="p-6 border-t border-white/5 flex items-center gap-4">
                <div id="user-avatar" class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center font-bold">H</div>
                <div class="flex-1 overflow-hidden"><p id="user-name" class="text-sm font-bold truncate">---</p><p id="user-rank" class="text-[9px] mono text-blue-400 uppercase">Rank --</p></div>
                <button onclick="cognitoSignOut()" class="text-slate-500 hover:text-red-500"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-20 border-b border-white/5 flex items-center justify-between px-10 glass">
                <h2 id="view-title" class="text-lg font-bold tracking-tight text-white">Executive Overview</h2>
                <div class="px-4 py-2 bg-emerald-500/10 border border-emerald-500/20 rounded-full"><span class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest">Cognito Secured</span></div>
            </header>
            <section id="content-container" class="flex-1 overflow-y-auto p-10 space-y-8 no-scrollbar">
                <div id="page-dashboard" class="page-content grid grid-cols-4 gap-6">
                    <div class="glass p-6 rounded-3xl"><p class="text-xs font-bold text-slate-500">NODE STATUS</p><h3 class="text-2xl font-black mono text-emerald-500 uppercase">Active</h3></div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // 1. AWS COGNITO CONFIG
        const poolData = {
            UserPoolId: 'us-east-1_XXXXX', // Replace with your Cognito User Pool ID
            ClientId: 'XXXXXXXXXXXXXXXXXXXX' // Replace with your App Client ID
        };
        const userPool = new AmazonCognitoIdentity.CognitoUserPool(poolData);

        // 2. FIREBASE (DATA ONLY)
        firebase.initializeApp({ projectId: "hem-platform" });
        const db = firebase.firestore();

        // 3. AUTH LOGIC (COGNITO HANDSHAKE)
        function launchCognitoHandshake() {
            // Option A: Custom Login Flow (Implemented below)
            // Option B: Redirect to Cognito Hosted UI
            // window.location.href = "https://your-domain.auth.us-east-1.amazoncognito.com/login...";
            
            // For this build, we use the standard check:
            const cognitoUser = userPool.getCurrentUser();
            if (cognitoUser != null) {
                cognitoUser.getSession((err, session) => {
                    if (err) { alert(err.message); return; }
                    if (session.isValid()) { unlockCORE(cognitoUser.getUsername()); }
                });
            } else {
                // If no user, prompt for AWS Auth (Simulated for this script)
                alert("Redirecting to AWS Authentication Nodes...");
                // Manual logic to handle auth would go here
            }
        }

        function unlockCORE(username) {
            document.getElementById('auth-gate').classList.add('hidden');
            document.getElementById('main-interface').classList.remove('hidden');
            document.getElementById('user-name').innerText = username;
            document.getElementById('user-rank').innerText = "RANK 10 // CEO";
            initCharts();
        }

        function cognitoSignOut() {
            const cognitoUser = userPool.getCurrentUser();
            if (cognitoUser) { cognitoUser.signOut(); }
            window.location.reload();
        }

        // --- UI UTILS ---
        function showPage(id) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${id}`).classList.remove('hidden');
        }

        function initCharts() {
            const ctx = document.getElementById('growthChart')?.getContext('2d');
            if(ctx) new Chart(ctx, { type: 'line', data: { labels: ['01', '02', '03'], datasets: [{ data: [10, 20, 30], borderColor: '#3B82F6' }] } });
        }

        // Initialize session check on load
        window.onload = launchCognitoHandshake;
    </script>
</body>
</html>
