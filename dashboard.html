<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.E.M. CORE | Institutional</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.7.1/firebase-app-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.7.1/firebase-auth-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.7.1/firebase-firestore-compat.min.js"></script>
    
    <style>
        :root { --bg: #020617; }
        body { background: var(--bg); color: white; margin: 0; font-family: sans-serif; }
        .hidden { display: none !important; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="loader" class="fixed inset-0 z-[999] bg-[#020617] flex items-center justify-center">
        <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-blue-500"></div>
    </div>

    <div id="auth-layer" class="hidden min-h-screen flex items-center justify-center p-6">
        <div class="glass p-10 rounded-3xl w-full max-w-md">
            <h1 class="text-2xl font-bold mb-6 text-center italic">H.E.M. <span class="text-blue-500">LOGIN</span></h1>
            <form id="login-form" class="space-y-4">
                <input type="email" id="email" placeholder="Email" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl outline-none" required>
                <input type="password" id="password" placeholder="Password" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl outline-none" required>
                <button type="submit" class="w-full bg-blue-600 p-4 rounded-xl font-bold uppercase text-xs tracking-widest">Login</button>
            </form>
        </div>
    </div>

    <div id="dash-layer" class="hidden min-h-screen flex flex-col">
        <header class="h-20 border-b border-white/10 flex items-center justify-between px-10 glass">
            <h2 class="font-bold">H.E.M. CORE <span class="text-blue-500">v10.2</span></h2>
            <div class="flex items-center gap-4">
                <span id="user-role" class="text-[10px] bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full font-mono">RANK --</span>
                <button onclick="logout()" class="text-xs text-red-500 font-bold uppercase">Logout</button>
            </div>
        </header>
        <main class="p-10 grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass p-8 rounded-3xl">
                <p class="text-xs text-slate-500 mb-2">OPERATOR</p>
                <h3 id="user-name" class="text-xl font-bold">---</h3>
            </div>
            <div class="glass p-8 rounded-3xl">
                <p class="text-xs text-slate-500 mb-2">DIVISION</p>
                <h3 id="user-division" class="text-xl font-bold text-blue-500">---</h3>
            </div>
            <div class="glass p-8 rounded-3xl">
                <p class="text-xs text-slate-500 mb-2">STAFF ONLINE</p>
                <h3 id="staff-count" class="text-xl font-bold text-emerald-500">--</h3>
            </div>
        </main>
    </div>

    <script>
        // 1. FIREBASE INIT
        const firebaseConfig = {
            apiKey: "AIzaSyACO46sTJQffwsQJfFN9cqYa_oDKG14AfQ",
            authDomain: "hem-platform.firebaseapp.com",
            projectId: "hem-platform",
            storageBucket: "hem-platform.firebasestorage.app",
            messagingSenderId: "846707696620",
            appId: "1:846707696620:web:59676e4223dcbe6c9816c9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // 2. URL CLEANER (Stops Cognito Tokens from breaking the logic)
        if (window.location.hash || window.location.search.includes('token')) {
            window.history.replaceState(null, "", window.location.pathname);
        }

        const loader = document.getElementById('loader');
        const authLayer = document.getElementById('auth-layer');
        const dashLayer = document.getElementById('dash-layer');

        // 3. SECURE AUTH OBSERVER
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                try {
                    // Try to get staff data
                    const doc = await db.collection("hem_staff").doc(user.uid).get();
                    if (doc.exists) {
                        const data = doc.data();
                        document.getElementById('user-name').innerText = data.name;
                        document.getElementById('user-role').innerText = `RANK ${data.accessLevel || '--'}`;
                        document.getElementById('user-division').innerText = data.division || 'General';
                        
                        // SWITCH UI
                        authLayer.classList.add('hidden');
                        dashLayer.classList.remove('hidden');
                    } else {
                        // User exists in Auth but not in hem_staff collection
                        console.error("No staff profile found.");
                        auth.signOut();
                    }
                } catch (e) {
                    console.error("Firestore sync error:", e);
                }
            } else {
                dashLayer.classList.add('hidden');
                authLayer.classList.remove('hidden');
            }
            loader.classList.add('hidden');
        });

        // 4. LOGIN HANDLER
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            loader.classList.remove('hidden');
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            
            auth.signInWithEmailAndPassword(email, pass).catch(err => {
                alert("Auth Error: " + err.message);
                loader.classList.add('hidden');
            });
        });

        function logout() {
            auth.signOut().then(() => window.location.reload());
        }

        // Live stats count
        db.collection("hem_staff").onSnapshot(snap => {
            document.getElementById('staff-total')?.innerText || (document.getElementById('staff-count').innerText = snap.size);
        });
    </script>
</body>
</html>
