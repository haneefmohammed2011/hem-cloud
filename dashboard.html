<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.E.M. CORE | Unified OS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.7.1/firebase-app-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.7.1/firebase-auth-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.7.1/firebase-firestore-compat.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --bg: #020617; --accent: #3b82f6; --glass: rgba(15, 23, 42, 0.8); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: white; margin: 0; overflow: hidden; }
        .glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .hidden { display: none !important; }
        .loading-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="loader" class="loading-screen">
        <div class="flex flex-col items-center gap-4">
            <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-[10px] tracking-[0.3em] font-bold text-blue-500 uppercase">H.E.M. Authenticating</p>
        </div>
    </div>

    <div id="auth-layer" class="hidden h-screen w-screen flex items-center justify-center bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-blue-900/20 via-slate-950 to-slate-950">
        <div class="glass p-10 rounded-[2.5rem] w-full max-w-md shadow-2xl">
            <div class="text-center mb-10">
                <h1 class="text-3xl font-extrabold italic mb-2">H.E.M. <span class="text-blue-500">CORE</span></h1>
                <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Institutional Access Only</p>
            </div>
            <form id="login-form" class="space-y-4">
                <input type="email" id="email" placeholder="Corporate Email" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-blue-500 transition-all text-sm" required>
                <input type="password" id="password" placeholder="Access Key" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-blue-500 transition-all text-sm" required>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold text-xs uppercase tracking-[0.2em] transition-all shadow-lg shadow-blue-600/20">Initialize Link</button>
            </form>
        </div>
    </div>

    <div id="dash-layer" class="hidden h-screen w-screen flex">
        <aside class="w-64 glass border-r border-white/5 flex flex-col">
            <div class="p-8">
                <h2 class="font-extrabold italic text-xl">H.E.M. <span class="text-blue-500">HQ</span></h2>
            </div>
            <nav class="flex-1 px-4 space-y-2">
                <button class="w-full flex items-center gap-4 px-4 py-3 rounded-xl bg-blue-500/10 text-blue-400 border-r-2 border-blue-500 font-bold text-sm uppercase tracking-tighter">
                    <i class="fa-solid fa-gauge"></i> Intelligence
                </button>
            </nav>
            <div class="p-6">
                <button onclick="logout()" class="w-full py-3 bg-red-500/10 text-red-500 rounded-xl font-bold text-[10px] uppercase">Terminate Session</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col">
            <header class="h-20 border-b border-white/5 flex items-center justify-between px-10">
                <div id="user-display" class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center font-bold" id="avatar">?</div>
                    <div>
                        <p id="user-name" class="text-sm font-bold uppercase tracking-tight">Syncing...</p>
                        <p id="user-role" class="text-[9px] text-blue-500 font-bold uppercase">Rank --</p>
                    </div>
                </div>
            </header>
            
            <div class="p-10 grid grid-cols-1 md:grid-cols-3 gap-6 overflow-y-auto">
                <div class="glass p-8 rounded-[2rem]">
                    <p class="text-[10px] font-bold text-slate-500 uppercase mb-2">Network Status</p>
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                        <span id="user-status" class="font-bold text-xl uppercase tracking-widest">---</span>
                    </div>
                </div>
                <div class="glass p-8 rounded-[2rem]">
                    <p class="text-[10px] font-bold text-slate-500 uppercase mb-2">Division</p>
                    <span id="user-division" class="font-bold text-xl uppercase tracking-widest text-blue-500">---</span>
                </div>
                <div class="glass p-8 rounded-[2rem]">
                    <p class="text-[10px] font-bold text-slate-500 uppercase mb-2">Staff Count</p>
                    <span id="staff-total" class="font-bold text-xl uppercase tracking-widest text-emerald-500">--</span>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- 1. CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyACO46sTJQffwsQJfFN9cqYa_oDKG14AfQ",
            authDomain: "hem-platform.firebaseapp.com",
            projectId: "hem-platform",
            storageBucket: "hem-platform.firebasestorage.app",
            messagingSenderId: "846707696620",
            appId: "1:846707696620:web:59676e4223dcbe6c9816c9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const loader = document.getElementById('loader');
        const authLayer = document.getElementById('auth-layer');
        const dashLayer = document.getElementById('dash-layer');

        // --- 2. THE MASTER OBSERVER (Handles the UI Swapping) ---
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                try {
                    // Fetch real staff data from your 'hem_staff' collection
                    const doc = await db.collection("hem_staff").doc(user.uid).get();
                    if (doc.exists) {
                        const data = doc.data();
                        document.getElementById('user-name').innerText = data.name;
                        document.getElementById('user-role').innerText = `${data.role} | ACCESS_${data.accessLevel}`;
                        document.getElementById('user-division').innerText = data.division;
                        document.getElementById('user-status').innerText = data.status;
                        document.getElementById('avatar').innerText = data.name.charAt(0);
                        
                        // Show Dashboard, Hide Login
                        authLayer.classList.add('hidden');
                        dashLayer.classList.remove('hidden');
                    }
                } catch (e) { console.error("Data Sync Fail:", e); }
            } else {
                // Show Login, Hide Dashboard
                dashLayer.classList.add('hidden');
                authLayer.classList.remove('hidden');
            }
            // Always hide loader once check is done
            loader.classList.add('hidden');
        });

        // --- 3. LOGIN EXECUTION ---
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            loader.classList.remove('hidden');
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            
            auth.signInWithEmailAndPassword(email, pass).catch(err => {
                alert("ACCESS DENIED: " + err.message);
                loader.classList.add('hidden');
            });
        });

        function logout() {
            auth.signOut().then(() => window.location.reload());
        }

        // Real-time Staff Count
        db.collection("hem_staff").onSnapshot(snap => {
            document.getElementById('staff-total').innerText = snap.size;
        });
    </script>
</body>
</html>
