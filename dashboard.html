<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.E.M. | DEEP VOID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --void: #000000; 
            --accent: #2563eb; 
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.05);
        }

        body { 
            background-color: var(--void); 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
        }

        /* DEEP VOID GLASS */
        .glass-panel { 
            background: var(--glass);
            backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            border-radius: 3rem;
            transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .glass-panel:hover {
            border-color: rgba(37, 99, 235, 0.3);
            background: rgba(255, 255, 255, 0.04);
        }

        /* CENTERED LAYOUT ENGINE */
        .app-container {
            display: grid;
            grid-template-columns: 320px 1fr;
            height: 100vh;
            width: 100vw;
            padding: 2rem;
            gap: 2rem;
        }

        /* INVISIBLE ELEMENTS */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .nav-link { 
            opacity: 0.3; 
            transition: 0.4s; 
            letter-spacing: 0.2em;
        }

        .nav-link:hover, .nav-link.active { 
            opacity: 1; 
            text-shadow: 0 0 20px rgba(37, 99, 235, 0.5);
        }

        .chart-container { position: relative; height: 100%; width: 100%; }
    </style>
</head>
<body class="no-scrollbar">

    <div class="app-container">
        
        <aside class="glass-panel flex flex-col p-12">
            <div class="mb-20 text-center">
                <h1 class="text-3xl font-black italic tracking-tighter">H.E.M.</h1>
                <p class="text-[9px] font-bold text-blue-500 uppercase tracking-[0.5em] mt-2">Deep Void OS</p>
            </div>

            <nav class="flex-1 space-y-12">
                <button onclick="nav('ops')" class="nav-link active w-full text-left text-[11px] font-black uppercase italic flex items-center gap-4">
                    <span class="w-1 h-1 bg-blue-500 rounded-full"></span> Operations
                </button>
                <button onclick="nav('monetag')" class="nav-link w-full text-left text-[11px] font-black uppercase italic flex items-center gap-4">
                    <span class="w-1 h-1 bg-slate-700 rounded-full"></span> Monetag
                </button>
                <button onclick="nav('infra')" class="nav-link w-full text-left text-[11px] font-black uppercase italic flex items-center gap-4">
                    <span class="w-1 h-1 bg-slate-700 rounded-full"></span> Cloud Infrastructure
                </button>
            </nav>

            <div class="mt-auto pt-10 border-t border-white/5 text-center">
                <p class="text-[10px] font-bold text-slate-500 uppercase mb-4">CEO Clearance</p>
                <button onclick="logout()" class="text-[9px] font-black text-red-500 uppercase tracking-widest hover:opacity-50">Disconnect</button>
            </div>
        </aside>

        <main class="flex flex-col gap-8 no-scrollbar overflow-y-auto">
            
            <header class="flex justify-between items-end px-4">
                <div>
                    <h2 id="view-title" class="text-4xl font-black italic uppercase tracking-tighter">Global Mainframe</h2>
                    <p class="text-[10px] text-slate-500 font-bold uppercase mt-2 tracking-widest">Real-time AWS & Monetag Synchronization</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest animate-pulse">● System_Nominal</p>
                </div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="glass-panel p-10">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.3em] mb-4">Yield (24H)</p>
                    <h3 id="stat-rev" class="text-4xl font-black text-blue-500">$1,330.34</h3>
                </div>
                <div class="glass-panel p-10">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.3em] mb-4">RDS Node Load</p>
                    <h3 id="stat-cpu" class="text-4xl font-black text-white">4.2%</h3>
                </div>
                <div class="glass-panel p-10">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.3em] mb-4">Live Traffic</p>
                    <h3 id="stat-traffic" class="text-4xl font-black text-white">1,240</h3>
                </div>
            </div>

            <div class="glass-panel p-12 flex-1 min-h-[500px]">
                <div class="flex justify-between items-center mb-10">
                    <h4 class="text-xs font-black uppercase tracking-widest text-slate-400 italic">Network Throughput Visualization</h4>
                    <div class="flex gap-4">
                        <span class="text-[9px] font-bold py-1 px-3 border border-white/10 rounded-full">AWS RDS</span>
                        <span class="text-[9px] font-bold py-1 px-3 border border-blue-500/50 text-blue-500 rounded-full">TRAFFIC</span>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="voidChart"></canvas>
                </div>
            </div>

        </main>
    </div>

    <script>
        // --- DATA HUB ---
        function nav(id) {
            const titles = { 'ops': 'Global Mainframe', 'monetag': 'Ad Performance', 'infra': 'AWS Cluster' };
            document.getElementById('view-title').innerText = titles[id];
            
            // Animation reset
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        // --- GRAPH ENGINE ---
        const ctx = document.getElementById('voidChart').getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(37, 99, 235, 0.2)');
        gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');

        const voidChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(24).fill(''),
                datasets: [{
                    label: 'Throughput',
                    data: [30, 45, 32, 70, 85, 60, 90, 120, 110, 150, 140, 180, 170, 210, 200, 250, 230, 280, 260, 310, 290, 340, 320, 400],
                    borderColor: '#2563eb',
                    borderWidth: 4,
                    pointRadius: 0,
                    tension: 0.4,
                    fill: true,
                    backgroundColor: gradient
                }]
            },
            options: {
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { display: false },
                    y: { 
                        grid: { color: 'rgba(255,255,255,0.02)', drawBorder: false },
                        ticks: { color: '#475569', font: { weight: 'bold', size: 10 } }
                    }
                }
            }
        });

        // --- LIVE UPDATES ---
        setInterval(() => {
            const cpu = (Math.random() * (6 - 3) + 3).toFixed(1);
            document.getElementById('stat-cpu').innerText = `${cpu}%`;
            
            // Update chart data point
            voidChart.data.datasets[0].data.shift();
            voidChart.data.datasets[0].data.push(Math.floor(Math.random() * (400 - 300) + 300));
            voidChart.update('none');
        }, 3000);

        function logout() {
            window.location.href = "https://eu-west-29f2urffk8.auth.eu-west-2.amazoncognito.com/logout?client_id=3uusgekid70adef850src7mr8t&logout_uri=https://core.hemafrica.com/dashboard.html";
        }
    </script>
</body>
</html>
