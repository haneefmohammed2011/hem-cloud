<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.E.M. CORE | Intelligence OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --hem-navy: #050a10; --hem-blue: #3B82F6; }
        body { font-family: 'Inter', sans-serif; background-color: var(--hem-navy); color: #e2e8f0; overflow: hidden; }
        .glass { background: rgba(16, 42, 67, 0.4); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .sidebar-active { background: linear-gradient(90deg, var(--hem-blue) 0%, transparent 100%); border-left: 4px solid var(--hem-blue); color: white !important; }
        .mono { font-family: 'Space Mono', monospace; }
        .rank-badge { font-size: 9px; padding: 2px 8px; border-radius: 4px; font-weight: 800; text-transform: uppercase; border: 1px solid currentColor; }
        #boot-screen { transition: opacity 0.8s ease; }
    </style>
</head>
<body>

    <div id="boot-screen" class="fixed inset-0 z-[100] bg-[#050a10] flex flex-col items-center justify-center">
        <div class="text-center">
            <h2 class="text-5xl font-black tracking-tighter mb-4 animate-pulse">HEM <span class="text-blue-500">CORE</span></h2>
            <div id="boot-status" class="text-slate-500 text-[10px] mono uppercase tracking-[0.3em] mb-8">Initializing Handshake...</div>
            <div class="w-48 h-1 bg-white/5 rounded-full overflow-hidden mx-auto">
                <div id="boot-progress" class="bg-blue-600 h-full w-0 transition-all duration-700"></div>
            </div>
        </div>
    </div>

    <div id="main-os" class="flex h-screen w-full hidden opacity-0 transition-opacity duration-1000">
        
        <aside class="w-72 bg-[#08121d] border-r border-white/5 flex flex-col">
            <div class="p-8">
                <h1 class="text-2xl font-black tracking-tighter italic">H.E.M <span class="text-blue-500">CORE</span></h1>
                <p class="text-[9px] text-slate-500 mono mt-1 tracking-widest uppercase">Institutional OS v7.3</p>
            </div>

            <nav class="flex-1 px-4 space-y-1 overflow-y-auto">
                <button onclick="switchPage('dashboard')" class="nav-btn sidebar-active w-full flex items-center gap-4 px-4 py-3 rounded-2xl text-sm font-bold transition-all">
                    <i class="fa-solid fa-gauge-high"></i> Command Center
                </button>
                <button data-access="7" onclick="switchPage('staff')" class="nav-btn w-full flex items-center gap-4 px-4 py-3 rounded-2xl text-slate-400 hover:text-white text-sm font-bold transition-all">
                    <i class="fa-solid fa-address-book"></i> Staff Matrix
                </button>
                <button data-access="5" onclick="switchPage('cinexa')" class="nav-btn w-full flex items-center gap-4 px-4 py-3 rounded-2xl text-slate-400 hover:text-white text-sm font-bold transition-all">
                    <i class="fa-solid fa-film"></i> Cinexa+ Studio
                </button>
            </nav>

            <div class="p-6 bg-[#0a1824] border-t border-white/5">
                <div class="flex items-center gap-4">
                    <div id="u-avatar" class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center font-bold shadow-lg">H</div>
                    <div class="flex-1 overflow-hidden">
                        <p id="u-name" class="text-xs font-bold truncate">---</p>
                        <p id="u-rank" class="text-[8px] mono text-blue-400 font-bold uppercase tracking-tighter">RANK --</p>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-20 border-b border-white/5 flex items-center justify-between px-10 glass">
                <h2 id="view-title" class="text-lg font-bold">Executive Overview</h2>
                <div id="node-id" class="text-[9px] mono text-blue-500/50">NODE_ILORIN_SECURE</div>
            </header>

            <section id="viewport" class="flex-1 overflow-y-auto p-10 space-y-8">
                <div id="page-dashboard" class="page-content space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="glass p-8 rounded-[2rem]">
                            <p class="text-[10px] font-bold text-slate-500 uppercase">Live Revenue</p>
                            <h3 class="text-4xl font-black mt-2 mono text-white" id="stat-revenue">$0.00</h3>
                        </div>
                        <div class="glass p-8 rounded-[2rem] border-l-4 border-blue-600">
                            <p class="text-[10px] font-bold text-slate-500 uppercase">Userbase</p>
                            <h3 class="text-4xl font-black mt-2 mono text-blue-500" id="stat-users">0</h3>
                        </div>
                        <div class="glass p-8 rounded-[2rem]">
                            <p class="text-[10px] font-bold text-slate-500 uppercase">Latency</p>
                            <h3 class="text-4xl font-black mt-2 mono text-emerald-500">22ms</h3>
                        </div>
                    </div>
                    <div class="glass p-8 rounded-[2.5rem] h-96">
                        <canvas id="mainChart"></canvas>
                    </div>
                </div>

                <div id="page-staff" class="page-content hidden">
                    <div id="staff-table" class="glass rounded-3xl p-4">
                        <h3 class="text-xl font-black p-4">Staff <span class="text-blue-500">Matrix</span></h3>
                        <div id="staff-list" class="space-y-2"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const AWS_LOGIN_URL = "https://eu-west-29f2urffk8.auth.eu-west-2.amazoncognito.com/login?client_id=3uusgekid70adef850src7mr8t&redirect_uri=https://core.hemafrica.com/dashboard.html&response_type=token&scope=email+openid+phone+profile";
        
        const firebaseConfig = {
            apiKey: "AIzaSyACO46sTJQffwsQJfFN9cqYa_oDKG14AfQ",
            authDomain: "hem-platform.firebaseapp.com",
            projectId: "hem-platform",
            storageBucket: "hem-platform.firebasestorage.app",
            messagingSenderId: "846707696620",
            appId: "1:846707696620:web:59676e4223dcbe6c9816c9"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let userProfile = null;

        // --- THE SILENT HANDSHAKE ---
        async function runHandshake() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const idToken = params.get('id_token');

            if (!idToken) {
                // NO TOKEN? Redirect to Cognito immediately.
                document.getElementById('boot-status').innerText = "Redirecting to AWS Identity...";
                setTimeout(() => window.location.href = AWS_LOGIN_URL, 1000);
                return;
            }

            try {
                updateBoot(30, "Decoding JWT...");
                const payload = JSON.parse(atob(idToken.split('.')[1]));
                const cognitoUid = payload.sub;

                updateBoot(60, "Searching Staff Matrix...");
                const doc = await db.collection("hem_staff").doc(cognitoUid).get();

                if (doc.exists) {
                    userProfile = doc.data();
                    launchSystem();
                } else if (payload.email.includes("haneef")) {
                    updateBoot(80, "Auto-Seeding CEO Rank...");
                    userProfile = { displayName: "Haneef Mohammed", email: payload.email, accessLevel: 10 };
                    await db.collection("hem_staff").doc(cognitoUid).set(userProfile);
                    launchSystem();
                } else {
                    document.getElementById('boot-status').innerText = "Access Denied: Node Unauthorized";
                    document.getElementById('boot-status').classList.add('text-red-500');
                }
            } catch (err) {
                console.error(err);
                document.getElementById('boot-status').innerText = "Handshake Error. Retrying...";
                setTimeout(() => window.location.href = AWS_LOGIN_URL, 2000);
            }
        }

        function launchSystem() {
            updateBoot(100, "Authorized.");
            setTimeout(() => {
                document.getElementById('boot-screen').style.opacity = "0";
                document.getElementById('main-os').classList.remove('hidden');
                setTimeout(() => {
                    document.getElementById('boot-screen').remove();
                    document.getElementById('main-os').style.opacity = "1";
                    renderUI();
                }, 800);
            }, 500);
        }

        function updateBoot(val, msg) {
            document.getElementById('boot-progress').style.width = val + "%";
            document.getElementById('boot-status').innerText = msg;
        }

        function renderUI() {
            document.getElementById('u-name').innerText = userProfile.displayName;
            document.getElementById('u-rank').innerText = `Rank ${userProfile.accessLevel} // CEO`;
            document.getElementById('u-avatar').innerText = userProfile.displayName[0];
            
            // Sync Live Stats
            db.collection("users").onSnapshot(s => document.getElementById('stat-users').innerText = s.size);
            initChart();
        }

        function switchPage(page) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${page}`).classList.remove('hidden');
            document.getElementById('view-title').innerText = page.toUpperCase();
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('sidebar-active'));
            event.currentTarget.classList.add('sidebar-active');
        }

        function initChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['00:00', '04:00', '08:00', '12:00', '16:00', '20:00'],
                    datasets: [{ data: [20, 50, 40, 90, 80, 60], borderColor: '#3B82F6', tension: 0.4, fill: true, backgroundColor: 'rgba(59,130,246,0.05)', pointRadius: 0 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
            });
        }

        window.onload = runHandshake;
    </script>
</body>
</html>
