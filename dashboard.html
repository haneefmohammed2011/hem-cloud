<div class="p-12 space-y-8">
    <div class="glass-card bg-black/80 border-blue-500/30 overflow-hidden flex flex-col h-[500px]">
        <div class="px-6 py-3 bg-blue-600/10 border-b border-white/5 flex justify-between items-center">
            <div class="flex gap-2">
                <div class="w-3 h-3 bg-red-500 rounded-full"></div>
                <div class="w-3 h-3 bg-yellow-500 rounded-full"></div>
                <div class="w-3 h-3 bg-green-500 rounded-full"></div>
            </div>
            <p class="text-[10px] font-black text-blue-500 uppercase tracking-widest">H.E.M. Neural Terminal</p>
            <span class="text-[9px] text-slate-500 mono">auth: hem_ceo_001</span>
        </div>

        <div id="terminal-output" class="flex-1 p-6 overflow-y-auto mono text-[12px] text-blue-400 space-y-2 no-scrollbar">
            <p class="text-slate-500">H.E.M. CORE [Version 1.0.42]</p>
            <p class="text-slate-500">(c) 2026 H.E.M. Africa Group. Absolute Control Initialized.</p>
            <p class="mt-4">Type <span class="text-white">'help'</span> for available system commands.</p>
        </div>

        <div class="p-6 bg-white/[0.02] flex items-center gap-4">
            <span class="text-blue-500 font-bold">CEO@HEM_CORE:~$</span>
            <input type="text" id="terminal-input" autofocus 
                   class="bg-transparent border-none outline-none text-white flex-1 mono text-[12px]" 
                   placeholder="Enter system command...">
        </div>
    </div>
</div>

<script>
    const input = document.getElementById('terminal-input');
    const output = document.getElementById('terminal-output');
    const LAMBDA_URL = 'https://4brozf732fjjkfd6i7y3sz3rcm0ydiey.lambda-url.eu-west-2.on.aws/';

    const printToTerm = (text, type = 'info') => {
        const p = document.createElement('p');
        p.className = type === 'error' ? 'text-red-500' : (type === 'success' ? 'text-emerald-500' : 'text-blue-400');
        p.innerHTML = `<span class="text-slate-600">>></span> ${text}`;
        output.appendChild(p);
        output.scrollTop = output.scrollHeight;
    };

    input.addEventListener('keydown', async (e) => {
        if (e.key === 'Enter') {
            const cmd = input.value.trim().toLowerCase();
            input.value = '';
            printToTerm(`<span class="text-white">${cmd}</span>`);

            if (cmd === 'help') {
                printToTerm("Available Commands:<br> - reboot: Initiate EC2 power cycle<br> - status: Check Neural Link health<br> - clear: Wipe terminal history<br> - kill: Emergency system shutdown");
            } else if (cmd === 'clear') {
                output.innerHTML = '';
            } else if (cmd === 'reboot') {
                printToTerm("INITIATING SECURE HANDSHAKE WITH AWS...", "info");
                try {
                    const res = await fetch(LAMBDA_URL, {
                        method: 'POST',
                        body: JSON.stringify({ token: 'YOUR_SECRET_CEO_KEY', action: 'REBOOT' })
                    });
                    if (res.ok) printToTerm("SUCCESS: EC2 Node reboot command accepted.", "success");
                    else printToTerm("CRITICAL: Authentication failed or Node unreachable.", "error");
                } catch (err) {
                    printToTerm(`ERROR: ${err.message}`, "error");
                }
            } else if (cmd === 'status') {
                printToTerm("NODE_ID: i-0985c49080b06b005<br>REGION: eu-west-2 (London)<br>STATUS: Operational");
            } else {
                printToTerm(`Unknown command: ${cmd}`, "error");
            }
        }
    });
</script>
