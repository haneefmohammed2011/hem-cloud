<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.E.M. CORE | Global Admin Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --hem-navy: #050a10; --hem-blue: #3B82F6; --hem-glass: rgba(16, 42, 67, 0.4); }
        body { font-family: 'Inter', sans-serif; background-color: var(--hem-navy); color: #e2e8f0; }
        .glass { background: var(--hem-glass); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .sidebar-active { background: linear-gradient(90deg, var(--hem-blue) 0%, transparent 100%); border-left: 4px solid var(--hem-blue); color: white !important; }
        .mono { font-family: 'Space Mono', monospace; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .role-badge { font-size: 9px; padding: 2px 8px; border-radius: 4px; font-weight: 800; text-transform: uppercase; border: 1px solid currentColor; }
        .rank-10 { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
    </style>
</head>
<body class="overflow-hidden">

    <div id="main-interface" class="flex h-screen w-full">
        
        <aside class="w-72 bg-[#08121d] border-r border-white/5 flex flex-col z-20">
            <div class="p-8 flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-black text-white shadow-lg">H</div>
                <h1 class="text-xl font-black tracking-tighter italic">HEM <span class="text-blue-500">CORE</span></h1>
            </div>

            <nav class="flex-1 px-4 space-y-1 overflow-y-auto no-scrollbar">
                <p class="text-[10px] font-bold text-slate-600 uppercase mb-4 px-4 tracking-widest">Intelligence</p>
                <button onclick="showPage('dashboard')" class="nav-link sidebar-active w-full flex items-center gap-4 px-4 py-3 rounded-2xl transition-all">
                    <i class="fa-solid fa-house-chimney text-sm"></i> <span class="text-sm font-semibold">Command Center</span>
                </button>
                <button onclick="showPage('users')" class="nav-link w-full flex items-center gap-4 px-4 py-3 rounded-2xl text-slate-400 hover:text-white transition-all">
                    <i class="fa-solid fa-users-gear text-sm"></i> <span class="text-sm font-semibold">Staff Matrix</span>
                </button>
                <button onclick="showPage('cinexa')" class="nav-link w-full flex items-center gap-4 px-4 py-3 rounded-2xl text-slate-400 hover:text-white transition-all">
                    <i class="fa-solid fa-clapperboard text-sm"></i> <span class="text-sm font-semibold">Cinexa+ CMS</span>
                </button>
            </nav>

            <div class="p-6 bg-[#0a1824] border-t border-white/5 flex items-center gap-4">
                <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center font-bold text-white shadow-lg shadow-blue-600/20">H</div>
                <div class="flex-1 overflow-hidden">
                    <p class="text-sm font-bold truncate text-white">Haneef Mohammed</p>
                    <p class="text-[9px] font-bold mono text-blue-400 uppercase tracking-tighter">RANK 10 // CEO</p>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden relative">
            <header class="h-20 border-b border-white/5 flex items-center justify-between px-10 glass">
                <h2 id="view-title" class="text-lg font-bold tracking-tight">Executive Overview</h2>
                <div class="flex items-center gap-4">
                    <div class="px-4 py-2 bg-emerald-500/10 border border-emerald-500/20 rounded-full">
                        <span class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest">Node: Ilorin Alpha</span>
                    </div>
                </div>
            </header>

            <section id="content-container" class="flex-1 overflow-y-auto p-10 space-y-8 no-scrollbar">
                <div id="page-dashboard" class="page-content space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <div class="glass p-6 rounded-3xl"><p class="text-xs font-bold text-slate-500">USERBASE</p><h3 class="text-3xl font-black mono text-white">105.4K</h3></div>
                        <div class="glass p-6 rounded-3xl border-l-4 border-blue-500"><p class="text-xs font-bold text-slate-500">REVENUE</p><h3 class="text-3xl font-black mono text-blue-500">$12.4M</h3></div>
                        <div class="glass p-6 rounded-3xl"><p class="text-xs font-bold text-slate-500">LATENCY</p><h3 class="text-3xl font-black mono text-emerald-500">12ms</h3></div>
                        <div class="glass p-6 rounded-3xl"><p class="text-xs font-bold text-slate-500">STORAGE</p><h3 class="text-3xl font-black mono text-white">2.4 PB</h3></div>
                    </div>
                    
                    <div class="glass p-8 rounded-[2.5rem] min-h-[400px]">
                        <canvas id="growthChart"></canvas>
                    </div>
                </div>

                <div id="page-users" class="page-content hidden space-y-6">
                    <div class="flex justify-between items-center">
                        <h3 class="text-2xl font-black text-white">Staff Matrix</h3>
                    </div>
                    <div class="glass rounded-3xl overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-white/5 text-[10px] font-bold text-slate-500 uppercase">
                                <tr><th class="px-8 py-5">Operator</th><th class="px-8 py-5">Designation</th><th class="px-8 py-5 text-right">Node</th></tr>
                            </thead>
                            <tbody class="text-sm">
                                <tr class="border-t border-white/5"><td class="px-8 py-5 font-bold text-white">Haneef Mohammed</td><td class="px-8 py-5"><span class="role-badge rank-10">CEO</span></td><td class="px-8 py-5 text-right mono text-blue-500">ILORIN_ALPHA</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        function showPage(id) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${id}`).classList.remove('hidden');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('sidebar-active'));
            event.currentTarget.classList.add('sidebar-active');
            document.getElementById('view-title').innerText = id.charAt(0).toUpperCase() + id.slice(1) + " Overview";
        }

        window.onload = () => {
            const ctx = document.getElementById('growthChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                    datasets: [{
                        label: 'Growth',
                        data: [12000, 19000, 30000, 45000, 70000, 105000],
                        borderColor: '#3B82F6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } },
                        x: { grid: { display: false }, ticks: { color: '#64748b' } }
                    }
                }
            });
        };
    </script>
</body>
</html>
