<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H.E.M CORE</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>

html, body {
    margin:0;
    padding:0;
    background:#030303;
    overflow:hidden;
}


#boot {
    position:fixed;
    inset:0;
    background:#030303;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#777;
    font-family:Arial;
    letter-spacing:3px;
    z-index:999999;
}

/* Dashboard hidden by default */
#app {
    display:none;
    height:100vh;
    color:white;
    font-family:sans-serif;
}

/* simple layout */
.container { display:flex; height:100vh; }
.sidebar { width:260px; background:#0a0a0a; padding:20px; }
.main { flex:1; padding:20px; }
.card { background:#111; padding:15px; border-radius:10px; }
</style>
</head>

<body>

<!-- 🔥 ABSOLUTE LOCK SCREEN -->
<div id="boot">SECURING H.E.M CORE...</div>

<!-- 🔥 REAL APP (hidden until auth success) -->
<div id="app">

<div class="container">

<div class="sidebar">
    <h2>H.E.M CORE</h2>
    <p id="ceo">LOCKED</p>
</div>

<div class="main">
    <h3>Dashboard</h3>
    <div class="card">System Ready</div>
</div>

</div>

</div>

<script>

/* ---------------- FIREBASE ---------------- */
const firebaseConfig = {
    apiKey: "AIzaSyACO46sTJQffwsQJfFN9cqYa_oDKG14AfQ",
    authDomain: "hem-platform.firebaseapp.com",
    projectId: "hem-platform",
    storageBucket: "hem-platform.firebasestorage.app",
    messagingSenderId: "846707696620",
    appId: "1:846707696620:web:59676e4223dcbe6c9816c9"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* ---------------- BOOT FLOW ---------------- */
auth.onAuthStateChanged(async (user) => {

    // STILL ON BOOT SCREEN
    if (!user) {
        window.location.href = "login.html";
        return;
    }

    try {
        const doc = await db.collection("hem_staff").doc(user.uid).get();

        if (!doc.exists || doc.data().accessLevel < 10) {
            throw new Error("NO ACCESS");
        }

        // 🔥 ONLY NOW SHOW APP (NO FLASH POSSIBLE)
        document.getElementById("boot").style.display = "none";
        document.getElementById("app").style.display = "block";

        document.getElementById("ceo").innerText = doc.data().name;

    } catch (e) {
        await auth.signOut();
        window.location.href = "login.html";
    }
});

</script>

</body>
</html>
