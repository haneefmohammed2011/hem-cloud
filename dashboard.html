<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.E.M. EXECUTIVE | LIVE OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --void: #000000; 
            --accent: #007aff; 
            --glass: rgba(10, 10, 10, 0.8);
            --border: rgba(255, 255, 255, 0.08);
        }

        body { 
            background: #000000;
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            overflow: hidden; height: 100vh;
        }

        .glass-panel { background: var(--glass); backdrop-filter: blur(50px); border: 0.5px solid var(--border); }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 0.5px solid var(--border); border-radius: 24px; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .glass-card:hover { border-color: var(--accent); background: rgba(255, 255, 255, 0.06); transform: translateY(-2px); }
        
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 18px; border-radius: 12px; color: #8e8e93; font-size: 13px; font-weight: 600; transition: 0.3s; }
        .nav-item.active { background: var(--accent); color: #fff; box-shadow: 0 4px 20px rgba(0, 122, 255, 0.3); }

        .status-pulse { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .pulse-green { background: #10b981; box-shadow: 0 0 10px #10b981; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body class="flex">

    <aside class="w-[280px] glass-panel flex flex-col p-8 z-50">
        <div class="flex items-center gap-4 mb-12">
            <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-blue-400 rounded-2xl flex items-center justify-center font-black italic shadow-2xl">H</div>
            <div>
                <h1 class="text-sm font-black tracking-tight uppercase">H.E.M. CORE</h1>
                <p class="text-[9px] text-blue-500 font-bold tracking-[0.2em]">OS v1.0 - PRODUCTION</p>
            </div>
        </div>

        <nav class="flex-1 space-y-1">
            <button class="nav-item active w-full"><i class="fa-solid fa-house-signal"></i> Mainframe</button>
            <button class="nav-item w-full"><i class="fa-solid fa-users-gear"></i> Personnel</button>
            <button class="nav-item w-full"><i class="fa-solid fa-vault"></i> Financials</button>
            <button class="nav-item w-full"><i class="fa-solid fa-brain"></i> Ontrixa AI</button>
        </nav>

        <div class="mt-auto glass-card p-4 bg-blue-500/5 border-blue-500/20">
            <span class="text-[9px] font-black text-blue-500 uppercase tracking-widest">Level 10 CEO</span>
            <p class="text-xs font-bold mt-1">Haneef Mohammed</p>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto bg-black">
        <header class="h-24 flex items-center justify-between px-12 border-b border-white/5 bg-black/40 backdrop-blur-md sticky top-0 z-40">
            <div>
                <h2 class="text-2xl font-black italic uppercase">Neural Link Dashboard</h2>
                <div class="flex items-center mt-1">
                    <span class="status-pulse pulse-green"></span>
                    <span id="system-status-text" class="text-[10px] font-black text-emerald-500 uppercase tracking-widest">System Operational</span>
                </div>
            </div>
            
            <div class="flex gap-4">
                <button onclick="executeSystemAction('REBOOT')" class="px-6 py-3 glass-card bg-blue-600/10 border-blue-500/40 text-blue-500 text-[10px] font-black uppercase tracking-widest hover:bg-blue-600 hover:text-white">
                    <i class="fa-solid fa-rotate mr-2"></i> Reboot Primary Node
                </button>
                <button onclick="executeSystemAction('KILL')" class="px-6 py-3 glass-card bg-red-600/10 border-red-500/40 text-red-500 text-[10px] font-black uppercase tracking-widest hover:bg-red-600 hover:text-white">
                    <i class="fa-solid fa-skull mr-2"></i> Master Kill Switch
                </button>
            </div>
        </header>

        <div class="p-12 space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="glass-card p-8">
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Network Yield</p>
                    <h3 class="text-4xl font-black">$1,432,590.22</h3>
                </div>
                <div class="glass-card p-8">
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Compute Load</p>
                    <h3 id="cpu-val" class="text-4xl font-black">4.2%</h3>
                </div>
                <div class="glass-card p-8">
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Active Sessions</p>
                    <h3 class="text-4xl font-black">12,402</h3>
                </div>
            </div>

            <div class="glass-card p-10 h-[450px]">
                <canvas id="liveChart"></canvas>
            </div>
        </div>
    </main>

    <script>
        const LAMBDA_URL = 'https://4brozf732fjjkfd6i7y3sz3rcm0ydiey.lambda-url.eu-west-2.on.aws/';
        const CEO_TOKEN = 'YOUR_SECRET_CEO_KEY'; // MUST MATCH YOUR LAMBDA CODE

        async function executeSystemAction(action) {
            const statusText = document.getElementById('system-status-text');
            
            if(!confirm(`CEO CLEARANCE REQUIRED: Confirm ${action} action on H.E.M. Infrastructure?`)) return;

            try {
                statusText.innerText = "LINKING TO AWS...";
                statusText.classList.remove('text-emerald-500');
                statusText.classList.add('text-blue-500');

                const response = await fetch(LAMBDA_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        token: CEO_TOKEN,
                        action: action === 'REBOOT' ? 'REBOOT' : 'SHUTDOWN'
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    alert(`SUCCESS: ${action} command confirmed by AWS Lambda.`);
                    statusText.innerText = "COMMAND EXECUTED";
                } else {
                    throw new Error(result.message || 'Access Denied');
                }
            } catch (err) {
                alert(`CRITICAL ERROR: ${err.message}`);
                statusText.innerText = "CONNECTION FAILED";
                statusText.classList.replace('text-blue-500', 'text-red-500');
            }
        }

        // --- DASHBOARD UI UPDATES ---
        const ctx = document.getElementById('liveChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(10).fill(''),
                datasets: [{
                    data: [10, 25, 45, 30, 60, 80, 55, 90, 110, 105],
                    borderColor: '#007aff',
                    borderWidth: 4,
                    tension: 0.4,
                    pointRadius: 0,
                    fill: true,
                    backgroundColor: 'rgba(0, 122, 255, 0.05)'
                }]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
        });

        setInterval(() => {
            const cpu = (Math.random() * (6 - 3) + 3).toFixed(1);
            document.getElementById('cpu-val').innerText = `${cpu}%`;
        }, 3000);
    </script>
</body>
</html>
