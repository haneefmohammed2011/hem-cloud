<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>H.E.M. CORE | Management OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #0066ff; --bg: #000; --panel: #0a0a0a; --border: rgba(255,255,255,0.08); }
        body { margin: 0; background: var(--bg); color: white; display: flex; height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; }
        
        aside { width: 260px; border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
        .nav-item { padding: 12px; color: #64748b; cursor: pointer; border-radius: 8px; margin-bottom: 5px; transition: 0.3s; font-size: 14px; }
        .nav-item:hover, .active { background: var(--accent); color: white; }

        /* The Modular Window */
        #content-frame { flex: 1; border: none; background: transparent; }
    </style>
</head>
<body>
    <aside>
        <h2 style="font-weight:900; margin-bottom:30px;">HEM <span style="color:var(--accent)">CORE</span></h2>
        <div class="nav-item active" onclick="loadPage('directory.html', this)"><i class="fa-solid fa-users"></i> User Directory</div>
        <div class="nav-item" onclick="loadPage('onboarding.html', this)"><i class="fa-solid fa-user-plus"></i> Add Personnel</div>
        <div class="nav-item" onclick="loadPage('cloud.html', this)"><i class="fa-solid fa-cloud"></i> HEM Cloud</div>
    </aside>

    <iframe id="content-frame" src="directory.html"></iframe>

    <script>
        function loadPage(page, el) {
            document.getElementById('content-frame').src = page;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        // Global Alert System
        window.hemNotify = (msg) => {
            alert("core.hemafrica.com says:\n\n" + msg);
        };
    </script>
</body>
</html>
