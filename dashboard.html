<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>H.E.M. CORE | Live Intelligence</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #0066ff; --neon: #00ff88; --bg: #000; --panel: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.1); }
        body { background: var(--bg); color: white; margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* Layout */
        aside { width: 280px; border-right: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; }
        main { flex: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at top right, #0a1128, #000); }
        
        /* Dashboard Components */
        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 24px; backdrop-filter: blur(10px); }
        .stat-box { margin-bottom: 20px; }
        .stat-label { font-size: 10px; color: #444; font-weight: 900; text-transform: uppercase; }
        .stat-value { font-size: 28px; font-weight: 900; font-family: 'Space Mono'; color: var(--neon); }
        
        /* Meeting List */
        .meeting-item { display: flex; align-items: center; gap: 15px; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .meeting-date { font-family: 'Space Mono'; font-size: 12px; color: var(--accent); }
    </style>
</head>
<body>

    <aside>
        <h2 style="font-weight:900; margin-bottom:40px;">HEM <span style="color:var(--accent)">CORE</span></h2>
        <div style="margin-top: auto; padding: 15px; background: var(--panel); border-radius: 12px;">
            <p id="user-name" style="font-weight: 800; font-size: 14px;">Syncing...</p>
            <p id="user-rank" style="font-size: 10px; color: var(--neon); font-family: 'Space Mono';">RANK --</p>
        </div>
    </aside>

    <main>
        <div class="grid">
            <div class="left-col">
                <div class="card" style="margin-bottom:20px;">
                    <div class="stat-box">
                        <p class="stat-label">Total Live Revenue (MTD)</p>
                        <div class="stat-value" id="live-revenue">$0.00</div>
                    </div>
                    <div style="height: 300px;">
                        <canvas id="liveChart"></canvas>
                    </div>
                </div>

                <div class="card">
                    <p class="stat-label" style="margin-bottom:15px;">Global Announcements</p>
                    <div id="announcement-stream">No active broadcasts.</div>
                </div>
            </div>

            <div class="right-col">
                <div class="card" style="height: 100%;">
                    <p class="stat-label" style="margin-bottom:20px;">Institutional Calendar</p>
                    <div id="meeting-list">
                        <p style="color:#444; font-size:12px;">Scanning for scheduled nodes...</p>
                    </div>
                    <button onclick="addMeeting()" style="width:100%; margin-top:20px; background:var(--accent); color:white; border:none; padding:12px; border-radius:8px; font-weight:800; cursor:pointer;">+ SCHEDULE MEETING</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyACO46sTJQffwsQJfFN9cqYa_oDKG14AfQ",
            authDomain: "hem-platform.firebaseapp.com",
            projectId: "hem-platform",
            storageBucket: "hem-platform.firebasestorage.app",
            messagingSenderId: "846707696620",
            appId: "1:846707696620:web:59676e4223dcbe6c9816c9"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- 1. LIVE CHART ENGINE ---
        const ctx = document.getElementById('liveChart').getContext('2d');
        const liveChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Revenue', data: [], borderColor: '#0066ff', tension: 0.4, fill: true, backgroundColor: 'rgba(0,102,255,0.05)' }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#444' } } } }
        });

        // --- 2. AUTO-DETECTING REVENUE & CHARTS ---
        db.collection("revenue").orderBy("timestamp", "asc").onSnapshot(snap => {
            let total = 0;
            const labels = [];
            const values = [];
            
            snap.forEach(doc => {
                const data = doc.data();
                total += data.amount;
                labels.push(data.label);
                values.push(data.amount);
            });

            document.getElementById('live-revenue').innerText = `$${total.toLocaleString()}`;
            liveChart.data.labels = labels;
            liveChart.data.datasets[0].data = values;
            liveChart.update();
        });

        // --- 3. AUTO-DETECTING CALENDAR ---
        db.collection("meetings").orderBy("date", "asc").onSnapshot(snap => {
            const list = document.getElementById('meeting-list');
            list.innerHTML = '';
            snap.forEach(doc => {
                const m = doc.data();
                list.innerHTML += `
                    <div class="meeting-item">
                        <div class="meeting-date">${m.date}</div>
                        <div>
                            <p style="font-size:13px; font-weight:700;">${m.title}</p>
                            <p style="font-size:10px; color:#444;">${m.time} • ${m.platform}</p>
                        </div>
                    </div>
                `;
            });
        });

        // --- 4. USER AUTH & RANK ---
        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                db.collection("users").doc(user.uid).onSnapshot(doc => {
                    const data = doc.data();
                    document.getElementById('user-name').innerText = data.displayName || "H.E.M. Operator";
                    document.getElementById('user-rank').innerText = `RANK ${data.accessLevel || 1} // CEO`;
                });
            }
        });

        // FUNCTION: Push real data to test the system
        function addMeeting() {
            const title = prompt("Meeting Title:");
            if(title) {
                db.collection("meetings").add({
                    title: title,
                    date: "APR 20",
                    time: "14:00 GMT",
                    platform: "HEM Connect"
                });
            }
        }
    </script>
</body>
</html>
